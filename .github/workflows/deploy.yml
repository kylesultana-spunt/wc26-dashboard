name: Refresh & deploy WC26 dashboard

# Builds in GitHub Actions and deploys STRAIGHT to Cloudflare via API token —
# no Cloudflare<->GitHub git connection to break. Runs every 15 min; only deploys
# when a match's data actually changed (or on a manual/code push).

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache ESPN raw match data
        uses: actions/cache@v4
        with:
          path: data/raw
          key: espn-raw-${{ github.run_id }}
          restore-keys: espn-raw-

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Refresh data + rebuild dashboard
        run: bash build_site.sh
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}

      - name: Did a match's data change?
        id: chg
        run: |
          if git diff --quiet -- data/team_matches.csv data/locked_bets.json data/fixtures.json data/odds.json; then
            echo "go=false" >> "$GITHUB_OUTPUT"; echo "no new match data"
          else
            echo "go=true"  >> "$GITHUB_OUTPUT"; echo "new data -> will deploy"
          fi

      - name: Deploy to Cloudflare Pages (direct, no git link)
        if: ${{ steps.chg.outputs.go == 'true' || github.event_name != 'schedule' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=wc26-dashboard --branch=main
