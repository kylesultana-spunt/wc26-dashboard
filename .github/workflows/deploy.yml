name: Refresh WC26 data & dashboard

on:
  schedule:
    - cron: "*/15 * * * *"     # every 15 min (GitHub cron may lag ~10-20 min)
  workflow_dispatch:            # manual "Run workflow" button
  push:
    branches: [ main ]

permissions:
  contents: write               # needed to commit the refreshed dashboard back

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache ESPN raw match data
        uses: actions/cache@v4
        with:
          path: data/raw
          key: espn-raw-${{ github.run_id }}
          restore-keys: espn-raw-

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Refresh data + rebuild dashboard
        run: bash build_site.sh

      # Only commit/redeploy when a match's DATA actually changed (not just the timestamp),
      # so Cloudflare rebuilds only after a real match — staying under its 500 builds/month.
      # [skip ci] stops the bot commit from re-triggering this workflow.
      - name: Commit & push only if new match data
        run: |
          git config user.name "wc26-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/team_matches.csv data/player_matches.csv data/referee_matches.csv \
                  data/review_cache_v2.json data/events_index.json data/tempo.json \
                  data/elo.tsv data/results_all.csv data/fixtures.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "no new match data — skipping rebuild/deploy"; exit 0
          fi
          git add dashboard.html public/
          git commit -m "auto: new match data + dashboard [skip ci]"
          git push
