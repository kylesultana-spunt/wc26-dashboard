name: Refresh WC26 data & dashboard

on:
  schedule:
    - cron: "*/15 * * * *"     # every 15 min (GitHub cron may lag ~10-20 min)
  workflow_dispatch:            # manual "Run workflow" button
  push:
    branches: [ main ]

permissions:
  contents: write               # needed to commit the refreshed dashboard back

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache ESPN raw match data
        uses: actions/cache@v4
        with:
          path: data/raw
          key: espn-raw-${{ github.run_id }}
          restore-keys: espn-raw-

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Refresh data + rebuild dashboard
        run: bash build_site.sh

      # commit the fresh dashboard back. [skip ci] stops this commit from re-triggering
      # the workflow; Cloudflare still redeploys from the push, so the live site updates.
      - name: Commit & push refreshed dashboard
        run: |
          git config user.name "wc26-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/ dashboard.html public/ || true
          git commit -m "auto: refresh data + rebuild dashboard [skip ci]" || { echo "nothing new"; exit 0; }
          git push
